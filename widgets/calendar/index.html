<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/theme.css">
  <style>
    body { gap: 8px; }

    .nav {
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      flex-shrink:     0;
    }

    .nav-btn {
      background:  none;
      border:      none;
      color:       var(--accent);
      font-family: var(--font);
      font-size:   15px;
      cursor:      pointer;
      padding:     2px 8px;
      line-height: 1;
      border-radius: 3px;
    }
    .nav-btn:hover { background: var(--bg-raised); }

    .month-label {
      font-size:      13px;
      font-weight:    bold;
      letter-spacing: 2px;
      color:          var(--text);
    }

    /* Day-of-week header */
    .dow-row {
      display:               grid;
      grid-template-columns: repeat(7, 1fr);
      flex-shrink:           0;
    }

    .dow {
      text-align:     center;
      font-size:      9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color:          var(--text-muted);
      padding-bottom: 4px;
    }

    .dow.weekend { color: var(--text-dim); }

    /* Day cells */
    #day-grid {
      flex:                  1;
      min-height:            0;
      display:               grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows:        1fr;
      gap:                   2px;
    }

    .day {
      display:         flex;
      align-items:     center;
      justify-content: center;
      font-size:       clamp(10px, 1.4vw, 14px);
      border-radius:   4px;
      color:           var(--text);
    }

    .day.other  { color: var(--bg-raised); }
    .day.weekend { color: var(--text-dim); }

    .day.today {
      background:  var(--accent);
      color:       #fff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="widget-header">
    <span class="title">Calendar</span>
  </div>

  <div class="nav">
    <button class="nav-btn" id="prev">&#9664;</button>
    <span class="month-label" id="month-label"></span>
    <button class="nav-btn" id="next">&#9654;</button>
  </div>

  <div class="dow-row">
    <div class="dow weekend">Su</div>
    <div class="dow">Mo</div>
    <div class="dow">Tu</div>
    <div class="dow">We</div>
    <div class="dow">Th</div>
    <div class="dow">Fr</div>
    <div class="dow weekend">Sa</div>
  </div>

  <div id="day-grid"></div>

  <script>
    const MONTHS = [
      "January","February","March","April","May","June",
      "July","August","September","October","November","December",
    ];

    let viewYear, viewMonth;

    function init() {
      const now = new Date();
      viewYear  = now.getFullYear();
      viewMonth = now.getMonth();
      render();
    }

    function changeMonth(delta) {
      viewMonth += delta;
      if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
      if (viewMonth > 11) { viewMonth = 0;  viewYear++; }
      render();
    }

    function render() {
      const now   = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

      document.getElementById("month-label").textContent =
        `${MONTHS[viewMonth]} ${viewYear}`;

      const firstDow    = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const prevTotal   = new Date(viewYear, viewMonth, 0).getDate();
      const totalCells  = Math.ceil((firstDow + daysInMonth) / 7) * 7;

      const grid = document.getElementById("day-grid");
      grid.innerHTML = "";

      for (let i = 0; i < totalCells; i++) {
        const el  = document.createElement("div");
        const dow = i % 7; // 0=Sun

        if (i < firstDow) {
          // Previous month
          el.className   = "day other";
          el.textContent = prevTotal - firstDow + i + 1;
        } else if (i >= firstDow + daysInMonth) {
          // Next month
          el.className   = "day other";
          el.textContent = i - firstDow - daysInMonth + 1;
        } else {
          const d       = i - firstDow + 1;
          const isToday = new Date(viewYear, viewMonth, d).getTime() === today;
          const weekend = dow === 0 || dow === 6;
          el.className  = ["day",
            isToday ? "today"   : "",
            weekend ? "weekend" : "",
          ].filter(Boolean).join(" ");
          el.textContent = d;
        }

        grid.appendChild(el);
      }
    }

    document.getElementById("prev").addEventListener("click", () => changeMonth(-1));
    document.getElementById("next").addEventListener("click", () => changeMonth(1));

    // Refresh at midnight to advance day highlight
    function scheduleNextDay() {
      const now  = new Date();
      const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
      setTimeout(() => { render(); scheduleNextDay(); }, next - now);
    }

    init();
    scheduleNextDay();
  </script>
</body>
</html>
