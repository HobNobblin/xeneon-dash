<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/theme.css">
  <style>
    body {
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .time {
      font-size: clamp(36px, 8vw, 72px);
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 4px;
      line-height: 1;
    }

    .time .seconds {
      color: #5555cc;
    }

    .date {
      font-size: clamp(15px, 2vw, 16px);
      color: #6060a0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .seconds-bar-track {
      width: 80%;
      height: 2px;
      background: var(--bg-raised);
      border-radius: 2px;
      overflow: hidden;
    }

    .seconds-bar-fill {
      height: 100%;
      background: #5555cc;
      border-radius: 2px;
      transition: width 1s linear;
    }
  </style>
</head>
<body>
  <div class="time">
    <span id="hm">00:00</span><span class="seconds">:<span id="ss">00</span></span>
  </div>
  <div class="seconds-bar-track">
    <div class="seconds-bar-fill" id="bar"></div>
  </div>
  <div class="date" id="date">—</div>

  <script src="/xeneon.js"></script>
  <script>
    let tz = null;

    function timeParts() {
      const fmt = new Intl.DateTimeFormat("en-US", {
        ...(tz ? { timeZone: tz } : {}),
        hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
      });
      const parts = {};
      fmt.formatToParts(new Date()).forEach(p => { parts[p.type] = p.value; });
      // hour12:false can yield "24" for midnight in some runtimes
      const h = String(parseInt(parts.hour) % 24).padStart(2, "0");
      return { h, m: parts.minute, s: parts.second, sec: parseInt(parts.second) };
    }

    function dateLine() {
      return new Date().toLocaleDateString("en-US", {
        ...(tz ? { timeZone: tz } : {}),
        weekday: "long", year: "numeric", month: "long", day: "numeric",
      }).toUpperCase();
    }

    function tick() {
      const { h, m, s, sec } = timeParts();
      document.getElementById("hm").textContent  = `${h}:${m}`;
      document.getElementById("ss").textContent  = s;
      document.getElementById("bar").style.width = `${(sec / 59) * 100}%`;
      document.getElementById("date").textContent = dateLine();
    }

    xeneon.on("ready", cfg => {
      tz = xeneon.location?.timezone || null;
      tick();
    });

    // Start ticking immediately with local time; timezone refines on ready
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
