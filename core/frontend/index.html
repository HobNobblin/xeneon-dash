<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xeneon Dash</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #07070f;
    }

    #grid {
      width: 100%;
      height: 100%;
      display: grid;
      gap: 4px;
      padding: 4px;
    }

    #grid iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 6px;
      background: transparent;
    }
  </style>
</head>
<body>
  <div id="grid"></div>
  <script src="/grid.js"></script>
</body>
</html>
