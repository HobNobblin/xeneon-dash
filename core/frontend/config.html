<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Xeneon Dash — Layout Config</title>
  <link rel="stylesheet" href="/theme.css">
  <style>
    body {
      background: #07070f;
      padding: 28px 32px;
      gap: 14px;
      height: 100vh;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #status { font-size: 11px; letter-spacing: 1px; transition: color 0.3s; }
    #status.saved   { color: var(--up); }
    #status.unsaved { color: var(--text-muted); }
    #status.error   { color: var(--down); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 7px 22px;
      font-family: var(--font);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover { opacity: 0.8; }

    .hint-text {
      font-size: 10px;
      color: var(--text-muted);
      margin-left: auto;
      letter-spacing: 1px;
    }

    /* ── Grid editor ───────────────────────────────────────── */
    #editor-wrap {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--bg-raised);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    #grid-bg {
      position: absolute;
      inset: 0;
      display: grid;
    }

    .grid-cell {
      border-right:  1px solid rgba(85, 85, 204, 0.08);
      border-bottom: 1px solid rgba(85, 85, 204, 0.08);
    }

    /* ── Widget blocks ─────────────────────────────────────── */
    .wblock {
      position: absolute;
      border-radius: 6px;
      border: 2px solid;
      padding: 8px 10px;
      cursor: grab;
      user-select: none;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .wblock:active { cursor: grabbing; }
    .wblock.dragging { opacity: 0.5; z-index: 10; }

    .wblock .wid {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .wblock .wdims { font-size: 10px; color: var(--text-muted); }

    .remove-btn {
      position: absolute;
      top: 4px;
      right: 6px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      font-family: var(--font);
    }
    .remove-btn:hover { color: var(--down); background: none; }

    .resize-handle {
      position: absolute;
      right: 5px;
      bottom: 5px;
      width: 12px;
      height: 12px;
      cursor: se-resize;
      border-right:  2px solid currentColor;
      border-bottom: 2px solid currentColor;
      border-radius: 0 0 2px 0;
      opacity: 0.5;
    }
    .resize-handle:hover { opacity: 1; }

    /* ── Ghost ─────────────────────────────────────────────── */
    #ghost {
      position: absolute;
      border-radius: 6px;
      border: 2px dashed;
      pointer-events: none;
      display: none;
    }
    #ghost.valid   { background: rgba(0,200,80,0.12);  border-color: var(--up); }
    #ghost.invalid { background: rgba(220,40,40,0.12); border-color: var(--down); }

    /* ── Location bar ─────────────────────────────────────── */
    .location-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      padding: 8px 12px;
      background: var(--bg-card);
      border: 1px solid var(--bg-raised);
      border-radius: 6px;
    }

    .loc-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .loc-field {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .loc-field span {
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .loc-input {
      background: var(--bg-raised);
      border: 1px solid var(--bg-raised);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      padding: 4px 7px;
      outline: none;
      transition: border-color 0.2s;
    }
    .loc-input:focus { border-color: var(--accent); }
    .loc-input.narrow { width: 90px; }
    .loc-input.wide   { width: 200px; }

    .loc-sep {
      width: 1px;
      height: 18px;
      background: var(--bg-raised);
      flex-shrink: 0;
    }

    /* ── Palette ───────────────────────────────────────────── */
    #palette-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 52px;
    }

    .palette-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    #palette {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .palette-item {
      border: 2px solid;
      border-radius: 5px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: grab;
      user-select: none;
    }
    .palette-item:active { cursor: grabbing; opacity: 0.6; }

    .palette-empty {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* Floating drag proxy (for palette → grid drags) */
    #drag-proxy {
      position: fixed;
      pointer-events: none;
      border-radius: 5px;
      border: 2px solid;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: none;
      z-index: 100;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="widget-header">
    <span class="title">Layout Config</span>
    <div class="toolbar">
      <button onclick="saveConfig()">Save</button>
      <span id="status" class="unsaved"></span>
      <span class="hint-text">drag to move &nbsp;·&nbsp; drag corner to resize &nbsp;·&nbsp; drag from palette to add</span>
    </div>
  </div>

  <div class="location-bar">
    <span class="loc-label">Location</span>
    <div class="loc-field">
      <span>Name</span>
      <input class="loc-input wide" id="loc-name" type="text" placeholder="e.g. Chicago" />
    </div>
    <div class="loc-sep"></div>
    <div class="loc-field">
      <span>Lat</span>
      <input class="loc-input narrow" id="loc-lat" type="number" step="0.0001" placeholder="41.8781" />
    </div>
    <div class="loc-field">
      <span>Lon</span>
      <input class="loc-input narrow" id="loc-lon" type="number" step="0.0001" placeholder="-87.6298" />
    </div>
    <div class="loc-sep"></div>
    <div class="loc-field">
      <span>Timezone</span>
      <input class="loc-input wide" id="loc-tz" type="text" placeholder="e.g. America/Chicago" />
    </div>
  </div>

  <div id="editor-wrap">
    <div id="grid-bg"></div>
    <div id="ghost"></div>
  </div>

  <div id="palette-wrap">
    <span class="palette-label">Available</span>
    <div id="palette"></div>
  </div>

  <div id="drag-proxy"></div>

  <script>
    // ── Palette ───────────────────────────────────────────────
    const PALETTE_COLORS = [
      "#4466cc","#44aacc","#cc8844","#44cc88",
      "#8844cc","#cc4488","#88cc44","#cc6644",
    ];

    function widgetColor(id) {
      let h = 0;
      for (const ch of id) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
      return PALETTE_COLORS[h % PALETTE_COLORS.length];
    }

    // ── State ─────────────────────────────────────────────────
    let cfg        = null;
    let manifests  = {};   // id → manifest
    let drag       = null; // { widget|null, el, offsetX, offsetY, fromPalette? }
    let rsz        = null;

    // ── Init ──────────────────────────────────────────────────
    async function init() {
      [cfg, manifests] = await Promise.all([
        fetch("/api/config").then(r => r.json()),
        fetch("/api/widgets").then(r => r.json()).then(arr => {
          const m = {};
          arr.forEach(w => m[w.id] = w);
          return m;
        }),
      ]);
      cfg.location ??= {};
      populateLocation();
      buildGrid();
      buildBlocks();
      buildPalette();
    }

    function populateLocation() {
      const loc = cfg.location ?? {};
      document.getElementById("loc-name").value = loc.name      ?? "";
      document.getElementById("loc-lat").value  = loc.latitude  ?? "";
      document.getElementById("loc-lon").value  = loc.longitude ?? "";
      document.getElementById("loc-tz").value   = loc.timezone  ?? "";
    }

    function readLocation() {
      const lat = parseFloat(document.getElementById("loc-lat").value);
      const lon = parseFloat(document.getElementById("loc-lon").value);
      cfg.location = {
        name:      document.getElementById("loc-name").value.trim() || "",
        latitude:  isNaN(lat) ? null : lat,
        longitude: isNaN(lon) ? null : lon,
        timezone:  document.getElementById("loc-tz").value.trim() || "",
      };
    }

    // Mark unsaved whenever location inputs change
    ["loc-name","loc-lat","loc-lon","loc-tz"].forEach(id => {
      document.getElementById(id)?.addEventListener("input", () =>
        setStatus("unsaved changes", "unsaved")
      );
    });

    function cellSize() {
      const r = document.getElementById("editor-wrap").getBoundingClientRect();
      return { cw: r.width / cfg.display.columns, ch: r.height / cfg.display.rows };
    }

    function buildGrid() {
      const bg = document.getElementById("grid-bg");
      const { columns, rows } = cfg.display;
      bg.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
      bg.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;
      bg.innerHTML = "";
      for (let i = 0; i < columns * rows; i++) {
        const c = document.createElement("div");
        c.className = "grid-cell";
        bg.appendChild(c);
      }
    }

    function buildBlocks() {
      document.querySelectorAll(".wblock").forEach(el => el.remove());
      const wrap = document.getElementById("editor-wrap");
      const { cw, ch } = cellSize();

      for (const w of cfg.widgets) {
        const color = widgetColor(w.id);
        const el    = document.createElement("div");
        el.className  = "wblock";
        el.dataset.id = w.id;
        el.style.borderColor     = color;
        el.style.backgroundColor = color + "18";
        el.style.color           = color;
        el.innerHTML = `
          <button class="remove-btn" title="Remove">×</button>
          <span class="wid">${w.id}</span>
          <span class="wdims">${w.position.w} × ${w.position.h}</span>
          <div class="resize-handle"></div>`;

        placeBlock(el, w.position, cw, ch);

        el.querySelector(".remove-btn").addEventListener("click", e => {
          e.stopPropagation();
          cfg.widgets = cfg.widgets.filter(x => x.id !== w.id);
          setStatus("unsaved changes", "unsaved");
          buildBlocks();
          buildPalette();
        });

        el.addEventListener("mousedown", e => {
          if (e.target.classList.contains("resize-handle")) return;
          if (e.target.classList.contains("remove-btn"))   return;
          e.preventDefault();
          const r = el.getBoundingClientRect();
          drag = { widget: w, el, offsetX: e.clientX - r.left, offsetY: e.clientY - r.top };
          el.classList.add("dragging");
        });

        el.querySelector(".resize-handle").addEventListener("mousedown", e => {
          e.preventDefault();
          e.stopPropagation();
          rsz = { widget: w, el, startW: w.position.w, startH: w.position.h,
                  startMX: e.clientX, startMY: e.clientY };
          el.classList.add("dragging");
        });

        wrap.appendChild(el);
      }
    }

    function buildPalette() {
      const palette  = document.getElementById("palette");
      const placedIds = new Set(cfg.widgets.map(w => w.id));
      const unplaced  = Object.values(manifests).filter(m => !placedIds.has(m.id));

      palette.innerHTML = unplaced.length === 0
        ? '<span class="palette-empty">all widgets placed</span>'
        : "";

      for (const m of unplaced) {
        const color = widgetColor(m.id);
        const el    = document.createElement("div");
        el.className  = "palette-item";
        el.dataset.id = m.id;
        el.textContent = m.id;
        el.style.borderColor     = color;
        el.style.color           = color;
        el.style.backgroundColor = color + "18";

        el.addEventListener("mousedown", e => {
          e.preventDefault();
          const proxy = document.getElementById("drag-proxy");
          proxy.textContent        = m.id;
          proxy.style.display      = "block";
          proxy.style.borderColor  = color;
          proxy.style.color        = color;
          proxy.style.background   = color + "22";
          proxy.style.left         = `${e.clientX - 30}px`;
          proxy.style.top          = `${e.clientY - 16}px`;

          const defaultW = m.defaultSize?.w ?? 3;
          const defaultH = m.defaultSize?.h ?? 3;

          drag = {
            widget: null,
            manifest: m,
            defaultW,
            defaultH,
            el: proxy,
            offsetX: 30,
            offsetY: 16,
            fromPalette: true,
          };
        });

        palette.appendChild(el);
      }
    }

    function placeBlock(el, pos, cw, ch) {
      el.style.left   = `${pos.x * cw}px`;
      el.style.top    = `${pos.y * ch}px`;
      el.style.width  = `${pos.w * cw}px`;
      el.style.height = `${pos.h * ch}px`;
    }

    // ── Collision ─────────────────────────────────────────────
    function occupancy(excludeId) {
      const { columns: cols, rows } = cfg.display;
      const map = Array.from({ length: rows }, () => new Array(cols).fill(null));
      for (const w of cfg.widgets) {
        if (w.id === excludeId) continue;
        for (let r = w.position.y; r < w.position.y + w.position.h; r++)
          for (let c = w.position.x; c < w.position.x + w.position.w; c++)
            if (r < rows && c < cols) map[r][c] = w.id;
      }
      return map;
    }

    function canPlace(id, x, y, w, h) {
      const { columns: cols, rows } = cfg.display;
      if (x < 0 || y < 0 || x + w > cols || y + h > rows) return false;
      const map = occupancy(id);
      for (let r = y; r < y + h; r++)
        for (let c = x; c < x + w; c++)
          if (map[r][c] !== null) return false;
      return true;
    }

    function editorCoords(e) {
      const r = document.getElementById("editor-wrap").getBoundingClientRect();
      return { ex: e.clientX - r.left, ey: e.clientY - r.top, inEditor: true };
    }

    function isOverEditor(e) {
      const r = document.getElementById("editor-wrap").getBoundingClientRect();
      return e.clientX >= r.left && e.clientX <= r.right &&
             e.clientY >= r.top  && e.clientY <= r.bottom;
    }

    // ── Mouse events ──────────────────────────────────────────
    document.addEventListener("mousemove", e => {
      if (!drag && !rsz) return;
      const { cw, ch } = cellSize();
      const ghost = document.getElementById("ghost");

      if (drag?.fromPalette) {
        drag.el.style.left = `${e.clientX - drag.offsetX}px`;
        drag.el.style.top  = `${e.clientY - drag.offsetY}px`;

        if (isOverEditor(e)) {
          const { ex, ey } = editorCoords(e);
          const col   = Math.max(0, Math.round((ex - drag.offsetX) / cw));
          const row   = Math.max(0, Math.round((ey - drag.offsetY) / ch));
          const valid = canPlace("__new__", col, row, drag.defaultW, drag.defaultH);
          ghost.style.display = "block";
          ghost.style.left    = `${col * cw}px`;
          ghost.style.top     = `${row * ch}px`;
          ghost.style.width   = `${drag.defaultW * cw}px`;
          ghost.style.height  = `${drag.defaultH * ch}px`;
          ghost.className     = valid ? "valid" : "invalid";
          ghost.dataset.col   = col;
          ghost.dataset.row   = row;
        } else {
          ghost.style.display = "none";
        }
        return;
      }

      if (drag) {
        const wr  = document.getElementById("editor-wrap").getBoundingClientRect();
        const rawX = e.clientX - wr.left - drag.offsetX;
        const rawY = e.clientY - wr.top  - drag.offsetY;
        drag.el.style.left = `${rawX}px`;
        drag.el.style.top  = `${rawY}px`;
        const col   = Math.round(rawX / cw);
        const row   = Math.round(rawY / ch);
        const { w, h } = drag.widget.position;
        const valid = canPlace(drag.widget.id, col, row, w, h);
        ghost.style.display = "block";
        ghost.style.left    = `${col * cw}px`;
        ghost.style.top     = `${row * ch}px`;
        ghost.style.width   = `${w * cw}px`;
        ghost.style.height  = `${h * ch}px`;
        ghost.className     = valid ? "valid" : "invalid";
        ghost.dataset.col   = col;
        ghost.dataset.row   = row;
      }

      if (rsz) {
        const dx  = e.clientX - rsz.startMX;
        const dy  = e.clientY - rsz.startMY;
        const { columns: cols, rows } = cfg.display;
        const { x, y } = rsz.widget.position;
        const w = Math.max(1, Math.min(cols - x, rsz.startW + Math.round(dx / cw)));
        const h = Math.max(1, Math.min(rows - y, rsz.startH + Math.round(dy / ch)));
        ghost.style.display = "block";
        ghost.style.left    = `${x * cw}px`;
        ghost.style.top     = `${y * ch}px`;
        ghost.style.width   = `${w * cw}px`;
        ghost.style.height  = `${h * ch}px`;
        ghost.className     = canPlace(rsz.widget.id, x, y, w, h) ? "valid" : "invalid";
        ghost.dataset.w = w;
        ghost.dataset.h = h;
      }
    });

    document.addEventListener("mouseup", e => {
      const ghost = document.getElementById("ghost");
      ghost.style.display = "none";

      if (drag?.fromPalette) {
        const proxy = document.getElementById("drag-proxy");
        proxy.style.display = "none";

        if (isOverEditor(e) && ghost.className === "valid") {
          const col = parseInt(ghost.dataset.col);
          const row = parseInt(ghost.dataset.row);
          cfg.widgets.push({
            id:       drag.manifest.id,
            position: { x: col, y: row, w: drag.defaultW, h: drag.defaultH },
          });
          setStatus("unsaved changes", "unsaved");
          buildBlocks();
          buildPalette();
        }
        drag = null;
        return;
      }

      if (drag) {
        const wr   = document.getElementById("editor-wrap").getBoundingClientRect();
        const rawX = e.clientX - wr.left - drag.offsetX;
        const rawY = e.clientY - wr.top  - drag.offsetY;
        const col  = Math.round(rawX / cw_now());
        const row  = Math.round(rawY / ch_now());
        const { w, h } = drag.widget.position;
        if (canPlace(drag.widget.id, col, row, w, h)) {
          drag.widget.position.x = col;
          drag.widget.position.y = row;
          setStatus("unsaved changes", "unsaved");
        }
        drag.el.classList.remove("dragging");
        drag = null;
        buildBlocks();
      }

      if (rsz) {
        const dx  = e.clientX - rsz.startMX;
        const dy  = e.clientY - rsz.startMY;
        const { columns: cols, rows } = cfg.display;
        const { x, y } = rsz.widget.position;
        const { cw, ch } = cellSize();
        const w = Math.max(1, Math.min(cols - x, rsz.startW + Math.round(dx / cw)));
        const h = Math.max(1, Math.min(rows - y, rsz.startH + Math.round(dy / ch)));
        if (canPlace(rsz.widget.id, x, y, w, h)) {
          rsz.widget.position.w = w;
          rsz.widget.position.h = h;
          setStatus("unsaved changes", "unsaved");
        }
        rsz.el.classList.remove("dragging");
        rsz = null;
        buildBlocks();
      }
    });

    function cw_now() { return cellSize().cw; }
    function ch_now() { return cellSize().ch; }

    // ── Save ──────────────────────────────────────────────────
    async function saveConfig() {
      readLocation();
      try {
        const res = await fetch("/api/config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(cfg),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        setStatus("saved", "saved");
        setTimeout(() => setStatus("", "unsaved"), 2000);
      } catch (err) {
        setStatus("save failed", "error");
        console.error(err);
      }
    }

    function setStatus(msg, cls) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className   = cls;
    }

    window.addEventListener("resize", () => { buildGrid(); buildBlocks(); });
    init();
  </script>
</body>
</html>
